services:
  unraid-mcp:
    build: .
    image: unraid-mcp:local
    environment:
      MCP_TRANSPORT: http
      MCP_HTTP_BEARER_TOKEN: ${MCP_HTTP_BEARER_TOKEN}
      MCP_HTTP_HOST: 0.0.0.0
      MCP_HTTP_PORT: 3000
      UNRAID_URL: https://tower.local/graphql
      UNRAID_API_KEY: ${UNRAID_API_KEY}
      UNRAID_DEFAULT_TOOLSETS: health
      UNRAID_ENABLE_MUTATIONS: "false"
    ports:
      - "127.0.0.1:3000:3000"
    restart: unless-stopped
